# Configuration for ants/v1 dataset

# Metadata
description: "Ant grooming behavior with yellow and blue markers"

# Frames processing
target_fps: 5  # Target frames per second for extraction
output_format: rgb24
overwrite_frames: false  # If true, re-extract frames even if already exist

# Treatment
treatment:
  column: treatment  # Column name in experiment.csv
  type: categorical  # categorical or continuous
  values: [0, 1, 2]  # Possible treatment values

# Covariates (features from experiment metadata)
covariates:
  batch:                 # Experimental batch (a-e)
    type: string
  position:              # Position in recording setup (1-9)
    type: string
  recording_hour:        # Hour of recording
    type: float

# Labels
overwrite_annotations: false  # If true, regenerate annotations even if already exist
outcomes:
  - Y2F  # Yellow-to-focal: binary (1 if grooming yellow/orange)
  - B2F  # Blue-to-focal: binary (1 if grooming blue)

# Outcome mapping: outcome strings --> (Y2F, B2F) tuples
outcome_mapping:
  "groom-yellow": [1, 0]
  "groom-blue": [0, 1]
  "groom-yellowandblue": [1, 1]

annotation_format:
  skiprows: 3           # Number of header rows to skip
  skipfooter: 1         # Number of footer rows to skip
  engine: python        # Parser engine
  columns:
    start_frame: "Beginning-frame"
    end_frame: "End-frame"
    outcome: "Behavior"
