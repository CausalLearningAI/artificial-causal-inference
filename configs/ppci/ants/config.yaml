# PPCI configuration for ants experiments

outcome:
  columns: [Y_Y2F, Y_B2F]   # yellow-to-focal, blue-to-focal
  # eval-time aggregation (does NOT affect MLP training):
  #   multilabel — each column independently
  #   or         — P(any positive) = 1 − ∏(1−pₖ)
  #   sum        — expected count = Σ pₖ
  task: multilabel

mlp:
  hidden_dim: 512
  hidden_layers: 1
  dropout: 0.3
  context_head_dim: 64   # Q/K projection dim for TemporalAttention (concat mode only)

training:
  method: ERM        # ERM | DERM | vREx | IRM
  batch_size: 256
  num_epochs: 15
  lr: 0.0001
  weight_decay: 0.001        # AdamW L2 regularisation (0 = plain Adam behaviour)
  seed: 0
  pos_weight: false          # neg/pos reweighting in BCE; inflates APO, off by default
  calibrate_temperature: true  # post-hoc temperature scaling on val set
  frame_stride: 10           # keep 1 frame per N (reduces temporal correlation)
  ic_weight: 1.0             # invariance penalty weight (vREx / IRM only)
  augment_noise_std: 0.0     # Gaussian noise std on embeddings (0 = off)
  augment_mixup_alpha: 0.2   # Mixup Beta(α,α) concentration (0 = off; 0.2 is a good start)
  context_window: 4          # Temporal context: k frames before+after each frame (0 = off)
  context_mode: mean         # "concat" → TemporalAttention aggregates (learned); "mean" → static average
  device: cuda

validation:
  n_videos: 5  # observation videos held out for model selection (0 = disable)

causal:
  # W_* confounders: define training environments (× treatment) and covariates W for all ATE estimators.
  # Missing columns are warned about and skipped.
  confounders: [W_nestbox, W_batch, W_annotator, W_weak_marking] 
  method: aipw  # ead | aipw | slearner | tlearner | xlearner | drlearner | causalforest

wandb:
  project: ppci-ants
  entity: null
  group: null
  tags: []
  mode: disabled   # online | offline | disabled
  run_name: null   # auto-set to method name if null
