# @package _global_
defaults:
  - /data: ants
  - /dataset: ants/v1

subject: ants
version: v1
annotations: yes   # yes | no | partial

# Processing overwrite flags
overwrite:
  videos: false        # If true, re-process videos even if already exist
  frames: false        # If true, re-extract frames even if already exist
  annotations: false   # If true, regenerate annotations even if already exist
  hf: false             # If true, regenerate HF dataset even if already exists
  embeddings: false    # If true, re-extract embeddings even if already exist
  tracking: false
  color_bounds: false  # If true, re-optimize HSV color bounds for tracking      # If true, re-run tracking even if CSVs already exist

