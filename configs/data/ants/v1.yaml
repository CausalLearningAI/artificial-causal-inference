# Experiment configuration for ants/v1

# Source path for raw videos
source_path: ./data/ants/v1/observations/source

# Video processing
target_fps: 5
target_resolution:
  width: 512
  height: 512

# Video encoding
video_codec: libopenh264
bitrate: 2M
remove_audio: true

# Processing settings
overwrite: false
show_progress: true
output_folder: full
